name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: pytest (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Floor (pyproject requires-python >= 3.11) and current.
        python: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python }}
          enable-cache: true
      - name: Sync (locked)
        run: uv sync --locked
      - name: Tests
        run: uv run pytest -q

  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync (locked)
        run: uv sync --locked
      - name: Lint
        run: uv run ruff check src tests
      - name: Format
        run: uv run ruff format --check src tests

  hygiene:
    name: public-repo hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: No committed secrets
        run: |
          # Real key material must never land in the repo; test fixtures use
          # obvious placeholders shorter than any real key.
          PATTERN='(sk-ant-[A-Za-z0-9_-]{24,}|sk-(proj-)?[A-Za-z0-9_-]{32,}|mr_sk_[A-Za-z0-9]{24,})'
          if git grep -n -E "$PATTERN"; then
            echo "::error::possible committed secret (see matches above)"
            exit 1
          fi

  build:
    name: package builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: uv build
        run: uv build
      - name: Wheel bundles the relay assets (#33)
        # An embedder stages the Deno relay from the installed wheel; a wheel
        # missing the package-data .ts files would only fail at a host's
        # build time. deps.ts is the single Pyodide pin site.
        run: |
          for f in relay.ts stream.ts broker.ts events.ts offline-probe.ts deps.ts; do
            unzip -l dist/*.whl | grep -q "droste/substrates/_relay/$f" || {
              echo "wheel is missing droste/substrates/_relay/$f"; exit 1;
            }
          done

  deno:
    name: deno (pyodide substrate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Cache Deno modules
        uses: actions/cache@v4
        with:
          # npm:pyodide@0.29.4 is ~50MB of wasm; cache the whole DENO_DIR
          # keyed on the pinned version (bump the key when the pin moves).
          path: ~/.cache/deno
          key: deno-${{ runner.os }}-pyodide-0.29.4
      - name: Substrate tests (unit + real-Pyodide integration)
        # cdn.jsdelivr.net + write to the deno cache: the npm pyodide package
        # unvendors stdlib sqlite3; loadPackage("sqlite3") fetches the wheel
        # from the CDN on first run and writes it inside the pyodide npm dir
        # (under DENO_DIR, so the cache step above persists it and the e2e
        # step below reads it from disk with no net or write of its own).
        run: >-
          deno test --allow-read --allow-env --allow-ffi
          --allow-net=cdn.jsdelivr.net --allow-write="$HOME/.cache/deno"
          pyodide/
      - name: Relay E2E (spawns the real relay.ts subprocess)
        run: >-
          deno test --allow-run --allow-read --allow-write
          --allow-net=127.0.0.1 --allow-env
          examples/pyodide-host/e2e_test.ts

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: pytest (py${{ matrix.python }})
    runs-on: [self-hosted, macOS, ARM64]
    strategy:
      fail-fast: false
      matrix:
        # Oldest supported and latest stable. Keep the floor honest without
        # multiplying jobs for every version in between.
        python: ["3.11", "3.14"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: ${{ matrix.python }}
          enable-cache: true
      - name: Sync (locked)
        # Verifiers' upstream pins currently exclude 3.14. Its markers make
        # this a no-op there while 3.11 exercises the real optional harness.
        run: uv sync --locked --extra verifiers
      - name: Verify optional Verifiers policy
        env:
          PYTHON_VERSION: ${{ matrix.python }}
        run: |
          if [ "$PYTHON_VERSION" = "3.11" ]; then
            uv run python -c 'import verifiers; import droste_verifiers'
          else
            uv run python -c \
              'import importlib.util; assert importlib.util.find_spec("verifiers") is None'
          fi
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.0.0
        if: matrix.python == '3.11'
        with:
          node-version: 22.16.0
      - name: Install pinned MCP reference server
        if: matrix.python == '3.11'
        run: npm ci --prefix tests/reference_mcp --ignore-scripts --no-audit --no-fund
      - name: Tests
        run: uv run pytest -q

  lint:
    name: ruff
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
      - name: Sync (locked)
        run: uv sync --locked
      - name: Lint
        run: uv run ruff check src tests
      - name: Format
        run: uv run ruff format --check src tests

  hygiene:
    name: public-repo hygiene
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: No committed secrets
        run: |
          # Real key material must never land in the repo; test fixtures use
          # obvious placeholders shorter than any real key.
          PATTERN='(sk-ant-[A-Za-z0-9_-]{24,}|sk-(proj-)?[A-Za-z0-9_-]{32,}|mr_sk_[A-Za-z0-9]{24,})'
          if git grep -n -E "$PATTERN"; then
            echo "::error::possible committed secret (see matches above)"
            exit 1
          fi

  build:
    name: package builds
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: uv build
        run: uv build
      - name: Wheel bundles the relay assets (#33)
        # An embedder stages the Deno relay from the installed wheel; a wheel
        # missing the package-data .ts files would only fail at a host's
        # build time. deps.ts is the single Pyodide pin site.
        run: |
          for f in relay.ts provider_duplex.ts stream.ts broker.ts events.ts offline-probe.ts deps.ts; do
            unzip -l dist/*.whl | grep -q "droste/substrates/_relay/$f" || {
              echo "wheel is missing droste/substrates/_relay/$f"; exit 1;
            }
          done
      - name: Wheel bundles and hashes prompt packs (#103)
        run: |
          for f in generic-full-v1.toml generic-minimal-v1.toml generic-none-v1.toml; do
            unzip -l dist/*.whl | grep -q "droste/prompts/packs/$f" || {
              echo "wheel is missing droste/prompts/packs/$f"; exit 1;
            }
          done
          tmp="$(mktemp -d)"
          uv venv "$tmp/venv"
          uv pip install --python "$tmp/venv/bin/python" dist/*.whl
          "$tmp/venv/bin/python" - "$PWD/src/droste/prompts/packs" <<'PY'
          import sys
          import tomllib
          from pathlib import Path

          from droste.prompts import (
              load_builtin_prompt_catalog,
              parse_prompt_pack,
              prompt_pack_content_sha256,
          )

          source_dir = Path(sys.argv[1])
          catalog = load_builtin_prompt_catalog()
          assert len(catalog.bindings) == 3
          wheel_packs = {binding.pack.pack_id: binding.pack for binding in catalog.bindings}
          assert len(wheel_packs) == len(catalog.bindings)
          filenames = (
              "generic-full-v1.toml",
              "generic-minimal-v1.toml",
              "generic-none-v1.toml",
          )
          for filename in filenames:
              source = parse_prompt_pack(
                  tomllib.loads((source_dir / filename).read_text(encoding="utf-8")),
                  source=str(source_dir / filename),
              )
              assert prompt_pack_content_sha256(source) == prompt_pack_content_sha256(
                  wheel_packs[source.pack_id]
              )
          PY
      - name: Distributions bundle the exact event ABI corpus (#144)
        run: |
          for f in trace-v2-lifecycle.ndjson runner-v6-refusal.ndjson; do
            unzip -l dist/*.whl | grep -q "droste/testing/fixtures/$f" || {
              echo "wheel is missing droste/testing/fixtures/$f"; exit 1;
            }
          done
          tmp="$(mktemp -d)"
          uv venv "$tmp/venv"
          uv pip install --python "$tmp/venv/bin/python" dist/*.whl
          "$tmp/venv/bin/python" - "$PWD/src/droste/testing/fixtures" <<'PY'
          import sys
          from pathlib import Path

          from droste.testing import runner_v6_refusal_ndjson, trace_v2_lifecycle_ndjson

          source = Path(sys.argv[1])
          assert trace_v2_lifecycle_ndjson() == (source / "trace-v2-lifecycle.ndjson").read_bytes()
          assert runner_v6_refusal_ndjson() == (source / "runner-v6-refusal.ndjson").read_bytes()
          PY
          sdist_root="$(tar tzf dist/droste-*.tar.gz | sed -n '1s#/.*##p')"
          tar xzf dist/droste-*.tar.gz -C "$tmp"
          cmp src/droste/testing/fixtures/trace-v2-lifecycle.ndjson \
            "$tmp/$sdist_root/src/droste/testing/fixtures/trace-v2-lifecycle.ndjson"
          cmp src/droste/testing/fixtures/runner-v6-refusal.ndjson \
            "$tmp/$sdist_root/src/droste/testing/fixtures/runner-v6-refusal.ndjson"

  deno:
    name: deno (pyodide substrate)
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Cache Deno modules
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          # npm:pyodide@0.29.4 is ~50MB of wasm; cache the whole DENO_DIR
          # keyed on the pinned version (bump the key when the pin moves).
          path: ${{ runner.temp }}/deno-cache
          key: deno-${{ runner.os }}-${{ runner.arch }}-pyodide-0.29.4
      - name: Substrate tests (unit + real-Pyodide integration)
        # cdn.jsdelivr.net + write to the deno cache: the npm pyodide package
        # unvendors stdlib sqlite3; loadPackage("sqlite3") fetches the wheel
        # from the CDN on first run and writes it inside the pyodide npm dir
        # (under DENO_DIR, so the cache step above persists it and the e2e
        # step below reads it from disk with no net or write of its own).
        env:
          DENO_DIR: ${{ runner.temp }}/deno-cache
        run: >-
          deno test --allow-read --allow-env --allow-ffi
          --allow-net=cdn.jsdelivr.net --allow-write="$DENO_DIR"
          pyodide/
      - name: Relay E2E (spawns the real relay.ts subprocess)
        env:
          DENO_DIR: ${{ runner.temp }}/deno-cache
        run: >-
          deno test --allow-run --allow-read --allow-write
          --allow-net=127.0.0.1 --allow-env
          examples/pyodide-host/e2e_test.ts

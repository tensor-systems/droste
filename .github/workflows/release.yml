name: Release

# Tag-driven releases (#14): pushing vX.Y.Z builds the sdist+wheel, publishes
# to PyPI via trusted publishing (OIDC — no long-lived token anywhere), and
# creates the GitHub release with the artifacts attached.
#
# One-time setup on PyPI (project "droste" → Publishing → add a trusted
# publisher): owner tensor-systems, repository droste, workflow release.yml,
# environment left blank. Until that exists, the publish step fails with an
# OIDC exchange error and nothing is uploaded.

on:
  push:
    tags: ["v*.*.*"]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write # create the GitHub release + upload assets
  id-token: write # mint the OIDC token PyPI trusted publishing exchanges

jobs:
  release:
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # full history: the on-main ancestry check needs it
          clean: true # self-hosted workspaces must not contribute stale release artifacts
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.11"
          enable-cache: true
      - name: Required release tooling is available
        run: |
          command -v gh >/dev/null || {
            echo "::error::gh is required to create and upload the GitHub release"
            exit 1
          }
          gh --version
      - name: Tag must point at a commit on main
        # A version tag pushed from an unmerged branch must not publish that
        # branch's package permanently to PyPI — only merge commits release.
        run: |
          git fetch --quiet --no-tags origin +refs/heads/main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" refs/remotes/origin/main; then
            echo "::error::tagged commit $GITHUB_SHA is not reachable from main — tag the merge commit on main"
            exit 1
          fi
      - name: Tag must match pyproject version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pyver="$(uv run --no-project --python 3.11 python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          if [ "$tag" != "$pyver" ]; then
            echo "::error::tag v$tag != pyproject version $pyver — bump pyproject.toml before tagging"
            exit 1
          fi
      - name: Sync (locked)
        run: uv sync --locked
      - name: Tests gate the release
        run: uv run pytest -q
      - name: Build sdist + wheel
        run: uv build
      - name: Publish to PyPI (trusted publishing)
        # --check-url makes re-runs idempotent: if a previous attempt uploaded
        # some artifacts before failing (or the release step after this one
        # failed), the retry verifies existing files against the index and
        # skips them instead of erroring on duplicate filenames.
        run: uv publish --trusted-publishing always --check-url https://pypi.org/simple/droste/
      - name: Bundle the Pyodide relay assets
        # Convenience artifact for non-Python consumers (#33): the EMBEDDER
        # path is now the wheel itself — the relay ships as package data
        # under droste/substrates/_relay (see `droste relay-path`), so wheel
        # and relay are version-locked by construction. Deliberately NOT in
        # dist/ — uv publish uploads dist/* to PyPI and would choke on a
        # tarball that isn't an sdist.
        run: |
          staging="droste-relay-$GITHUB_REF_NAME"
          mkdir -p "$staging/conformance" relay-dist
          cp src/droste/substrates/_relay/*.ts pyodide/README.md "$staging/"
          cp src/droste/testing/fixtures/trace-v2-lifecycle.ndjson \
            src/droste/testing/fixtures/runner-v6-refusal.ndjson \
            "$staging/conformance/"
          printf '%s %s\n' "$GITHUB_REF_NAME" "$GITHUB_SHA" > "$staging/DROSTE_VERSION"
          tar czf "relay-dist/$staging.tar.gz" "$staging"
      - name: GitHub release with artifacts
        # Retry-safe like the PyPI step: create only when absent, and upload
        # assets with replacement semantics so a rerun completes a partial
        # release instead of failing on "already exists".
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes
          fi
          gh release upload "$GITHUB_REF_NAME" dist/* relay-dist/*.tar.gz --clobber
